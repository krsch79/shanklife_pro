{% extends "base.html" %}
{% block title %}Endre passord - Shanklife scoring{% endblock %}

{% block content %}
<h2>Endre passord</h2>

<form method="post" class="form-card narrow-form">
    <label for="current_password">Nåværende passord</label>
    <input type="password" id="current_password" name="current_password" required>

    <label for="new_password">Nytt passord</label>
    <input type="password" id="new_password" name="new_password" required>

    <label for="confirm_password">Bekreft nytt passord</label>
    <input type="password" id="confirm_password" name="confirm_password" required>

    <div class="button-row">
        <button type="submit" class="button">Lagre passord</button>
        <a class="button secondary" href="{{ url_for('profile.me') }}">Avbryt</a>
    </div>
</form>
{% endblock %}
